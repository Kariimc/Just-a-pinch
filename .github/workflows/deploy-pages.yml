name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
    paths:
      - 'mobile/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Build web export
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx expo export --platform web --output-dir ../dist/app

      - name: Brand the pre-mount paint (kill the white flash before the splash)
        run: |
          node -e "const fs=require('fs');const f='dist/app/index.html';let s=fs.readFileSync(f,'utf8');if(!s.includes('jap-prepaint')){s=s.replace('</head>','  <style id=\"jap-prepaint\">html,body{background-color:#2E9E57}#root{background-color:#2E9E57}</style>\n</head>');fs.writeFileSync(f,s);}"

      - name: Copy docs (landing page + legal) to dist root
        run: cp -r docs/. dist/

      - name: SPA fallback — deep links into the app load app/index.html
        run: cp dist/app/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
