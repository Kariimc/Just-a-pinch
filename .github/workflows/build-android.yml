name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://qdlfiewspjgbucszezja.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Download and upload APK artifact
        working-directory: mobile
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const b=JSON.parse(d);console.log(b[0].artifacts.buildUrl)")
          curl -L "$APK_URL" -o just-a-pinch.apk
          echo "APK_URL=$APK_URL" >> $GITHUB_STEP_SUMMARY
          echo "## APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "Download: $APK_URL" >> $GITHUB_STEP_SUMMARY
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: just-a-pinch-${{ github.run_number }}.apk
          path: mobile/just-a-pinch.apk
          retention-days: 7
