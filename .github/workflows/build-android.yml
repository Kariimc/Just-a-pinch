name: Build Android (Production)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile (preview = installable APK, production = Play Store AAB)
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build — Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build Android
        working-directory: mobile
        run: npx eas-cli build --platform android --profile ${{ inputs.profile || 'preview' }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
